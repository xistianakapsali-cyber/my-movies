<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YIOLO Ultimate Database 2026</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --primary: #e50914; --bg: #0a0a0a; --card: #141414; 
            --text: #ffffff; --border: #222; --gold: #ffc107;
            --input-bg: #1a1a1a;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s; overflow-x: hidden; }

        #loadingBarContainer { position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 2000; background: transparent; }
        #loadingBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s ease; box-shadow: 0 0 10px var(--primary); }

        header { 
            padding: 15px 5%; background: var(--card); position: sticky; top: 0; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .logo { color: var(--primary); font-weight: 800; font-size: 24px; letter-spacing: 1px; }
        #movieCount { font-size: 12px; background: var(--input-bg); padding: 5px 12px; border-radius: 15px; border: 1px solid var(--border); color: #888; }

        .search-section { padding: 30px 5% 10px; text-align: center; }
        .search-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        #movieSearch { 
            width: 100%; padding: 14px 25px; border-radius: 30px; 
            border: 1px solid var(--border); background: var(--input-bg); color: var(--text); 
            outline: none; font-size: 16px; box-sizing: border-box;
        }
        .filters-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

        .categories { display: flex; justify-content: center; gap: 10px; padding: 10px 5% 30px; flex-wrap: wrap; }
        .cat-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.3s; outline: none; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        select.cat-btn { appearance: none; padding-right: 30px; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://w3.org" width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M7 10l5 5 5-5z""")/>></svg>'); background-repeat: no-repeat; background-position: right 10px center; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 0 5% 50px; }
        .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s ease; position: relative; }
        .movie-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        .img-container { position: relative; overflow: hidden; aspect-ratio: 2/3; background: #1a1a1a; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        
        .movie-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; text-align: center; opacity: 0; transition: 0.3s; box-sizing: border-box; }
        .movie-card:hover .movie-overlay { opacity: 1; }
        .movie-overlay p { font-size: 12px; line-height: 1.4; }

        .quality-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; z-index: 10; }
        .new-tag { position: absolute; top: 38px; left: 10px; background: #ffc107; color: black; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 10; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }

        /* HEART POP EFFECT */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        .wishlist-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); border: none; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; z-index: 11; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .wishlist-btn.active { background: var(--primary); animation: heartPop 0.3s ease-out; }

        .info { padding: 15px; }
        .info h3 { font-size: 14px; margin: 0 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .genre-tag { font-size: 10px; color: var(--primary); text-transform: uppercase; font-weight: bold; }
        .rating { color: var(--gold); font-size: 11px; margin: 5px 0; }
        .actors-text { font-size: 10px; color: #888; display: block; margin-bottom: 10px; }
        .play-btn { background: var(--primary); color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; display: block; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loadingBarContainer"><div id="loadingBar"></div></div>

<header>
    <div class="logo">YIOLO</div>
    <div id="movieCount">Σύνολο: 0</div>
</header>

<div class="search-section">
    <div class="search-container">
        <input type="text" id="movieSearch" placeholder="Τίτλος, ηθοποιός..." onkeyup="handleSearchInput(event)">
        <div class="filters-row">
            <select id="yearFilter" class="cat-btn" onchange="handleYearChange(this.value)">
                <option value="All">Όλες οι χρονιές</option>
                <option value="2025-2027">2025 - 2026+</option>
                <option value="2010-2024">2010 - 2024</option>
                <option value="1900-2009">Παλιότερες</option>
            </select>
            <select id="countryFilter" class="cat-btn" onchange="handleCountryChange(this.value)">
                <option value="All">Όλες οι Χώρες</option>
                <option value="United States">🇺🇸 USA</option>
                <option value="United Kingdom">🇬🇧 UK</option>
                <option value="Germany">🇩🇪 Germany</option>
                <option value="France">🇫🇷 France</option>
                <option value="Canada">🇨🇦 Canada</option>
                <option value="Australia">🇦🇺 Australia</option>
            </select>
        </div>
    </div>
</div>

<div class="categories" id="genreFilters">
    <button class="cat-btn active" onclick="handleCategory('All')">Όλα</button>
    <button class="cat-btn" onclick="handleCategory('Drama')">Drama</button>
    <button class="cat-btn" onclick="handleCategory('Western')">Western</button>
    <button class="cat-btn" onclick="handleCategory('Sci-Fi')">Sci-Fi</button>
    <button class="cat-btn" onclick="showFavorites()" style="color: #e50914; border-color: #e50914;">❤️ Liked</button>
</div>

<div class="movie-grid" id="movieGrid"></div>

<script>
    const movies = [
        { title: "The Matrix", year: 1999, country: "United States", quality: "HD", genre: "Sci-Fi", actors: "Keanu Reeves, L. Fishburne", rating: 5, poster: "matrix.jpg", link: "#", desc: "Η κλασική περιπέτεια που άλλαξε τον κινηματογράφο." },
        { title: "Gladiator", year: 2000, country: "United States", quality: "HD", genre: "Action", actors: "Russell Crowe, Joaquin Phoenix", rating: 5, poster: "gladiator.jpg", link: "#", desc: "Ένας στρατηγός γίνεται μονομάχος για να πάρει εκδίκηση." },
        { title: "Gladiator II", year: 2025, country: "United States", quality: "HD", genre: "Action", actors: "Paul Mescal, Pedro Pascal", rating: 4, poster: "gladiator2.jpg", link: "#", desc: "Η συνέχεια του επικού έπους, χρόνια μετά τον Μάξιμο." },
        { title: "Inception", year: 2010, country: "United States", quality: "HD", genre: "Sci-Fi", actors: "Leonardo DiCaprio, Elliot Page", rating: 4, poster: "inception.jpg", link: "#", desc: "Κλέφτες ονείρων σε μια αποστολή χωρίς επιστροφή." },
        { title: "1883", year: 2021, country: "United States", quality: "HD", genre: "Western", actors: "Sam Elliott, Tim McGraw", rating: 5, poster: "1883.jpg", link: "#", desc: "Η οικογένεια Dutton ξεκινά το ταξίδι προς τη Δύση." },
        { title: "1899", year: 2022, country: "Germany", quality: "HD", genre: "Drama", actors: "Emily Beecham, Aneurin Barnard", rating: 4, poster: "1899.jpg", link: "#", desc: "Μυστήριο σε πλοίο με μετανάστες." },
        { title: "1923", year: 2022, country: "United States", quality: "HD", genre: "Western", actors: "Harrison Ford, Helen Mirren", rating: 5, poster: "1923.jpg", link: "#", desc: "Μια νέα γενιά Dutton αντιμετωπίζει δυσκολίες." },
        { title: "Alaska Daily", year: 2022, country: "United States", quality: "HD", genre: "Drama", actors: "Hilary Swank, Jeff Perry", rating: 4, poster: "alaska_daily.jpg", link: "#", desc: "Μια δημοσιογράφος στην Αλάσκα αναζητά την αλήθεια." },
        { title: "American Horror Stories", year: 2021, country: "United States", quality: "HD", genre: "Drama", actors: "Sierra McCormick, Matt Bomer", rating: 3, poster: "ahs.jpg", link: "#", desc: "Αυτοτελείς ιστορίες τρόμου και μυστηρίου." },
        { title: "Χίλια Χτυπήματα", year: 2025, country: "United Kingdom", quality: "HD", genre: "Drama", actors: "Stephen Graham, Erin Doherty", rating: 5, poster: "thousand_blows.jpg", link: "#", desc: "Υπόκοσμος του βικτοριανού Λονδίνου." },
        { title: "Άννα με Α", year: 2017, country: "Canada", quality: "HD", genre: "Drama", actors: "Amybeth McNulty, Geraldine James", rating: 5, poster: "anne_with_a.jpg", link: "#", desc: "Η ζωή της ορφανής Άννας στο Άβονλι." },
        { title: "Around the World in 80 Days", year: 2021, country: "Belgium", quality: "HD", genre: "Drama", actors: "David Tennant, Ibrahim Koma", rating: 4, poster: "80days.jpg", link: "#", desc: "Το κλασικό ταξίδι του Φιλέα Φογκ." },
        { title: "Άβαταρ: Ο Μαχητής", year: 2024, country: "United States", quality: "HD", genre: "Drama", actors: "Gordon Cormier, Kiawentiio", rating: 4, poster: "avatar.jpg", link: "#", desc: "Η ζωντανή μεταφορά του θρυλικού animation." },
        { title: "Balthazar", year: 2018, country: "France", quality: "HD", genre: "Drama", actors: "Tomer Sisley, Yannig Samot", rating: 4, poster: "balthazar.jpg", link: "#", desc: "Ιδιοφυής ιατροδικαστής λύνει εγκλήματα." },
        { title: "Beef", year: 2023, country: "United States", quality: "HD", genre: "Drama", actors: "Steven Yeun, Ali Wong", rating: 5, poster: "beef.jpg", link: "#", desc: "Μια σύγκρουση στο δρόμο αλλάζει δύο ζωές." },
        { title: "Blue Lights", year: 2023, country: "United Kingdom", quality: "HD", genre: "Drama", actors: "Siân Brooke, Martin McCann", rating: 4, poster: "blue_lights.jpg", link: "#", desc: "Η καθημερινότητα αστυνομικών στο Μπέλφαστ." },
        { title: "Cobra Kai", year: 2018, country: "United States", quality: "HD", genre: "Drama", actors: "Ralph Macchio, William Zabka", rating: 5, poster: "cobra_kai.jpg", link: "#", desc: "Η κόντρα του Karate Kid συνεχίζεται." },
        { title: "Dahmer", year: 2022, country: "United States", quality: "HD", genre: "Drama", actors: "Evan Peters, Niecy Nash", rating: 4, poster: "dahmer.jpg", link: "#", desc: "Η ανατριχιαστική ιστορία του Jeffrey Dahmer." },
        { title: "Dark", year: 2017, country: "Germany", quality: "HD", genre: "Sci-Fi", actors: "Louis Hofmann, Lisa Vicari", rating: 5, poster: "dark.jpg", link: "#", desc: "Μυστήριο και παράλληλοι χρόνοι στη Γερμανία." },
        { title: "Σκοτεινοί άνεμοι", year: 2022, country: "United States", quality: "HD", genre: "Drama", actors: "Zahn McClarnon, Kiowa Gordon", rating: 4, poster: "dark_winds.jpg", link: "#", desc: "Εγκλήματα σε καταυλισμό Ναβάχο." },
        { title: "Game of Thrones", year: 2011, country: "United States", quality: "HD", genre: "Sci-Fi", actors: "Emilia Clarke, Kit Harington", rating: 5, poster: "got.jpg", link: "#", desc: "Ο επικός αγώνας για τον θρόνο του Westeros." },
        { title: "Harrow", year: 2018, country: "Australia", quality: "HD", genre: "Drama", actors: "Ioan Gruffudd, Remy Hii", rating: 4, poster: "harrow.jpg", link: "#", desc: "Αντισυμβατικός ιατροδικαστής στην Αυστραλία." },
        { title: "His Dark Materials", year: 2019, country: "United Kingdom", quality: "HD", genre: "Sci-Fi", actors: "Dafne Keen, Ruth Wilson", rating: 4, poster: "dark_materials.jpg", link: "#", desc: "Ταξίδι σε παράλληλους κόσμους." },
        { title: "House of the Dragon", year: 2022, country: "United States", quality: "HD", genre: "Sci-Fi", actors: "Matt Smith, Emma D'Arcy", rating: 5, poster: "hotd.jpg", link: "#", desc: "Η άνοδος και η πτώση του οίκου Targaryen." }
    ];

    let filteredMovies = [...movies];

    function displayMovies(list) {
        document.getElementById('movieCount').innerText = `Σύνολο: ${list.length}`;
        const grid = document.getElementById('movieGrid');
        const favs = JSON.parse(localStorage.getItem('favorites')) || [];
        grid.innerHTML = list.map(m => {
            const isFav = favs.includes(m.title);
            const isNew = m.year >= 2025;
            return `
            <div class="movie-card">
                <div class="quality-tag">${m.quality}</div>
                ${isNew ? '<div class="new-tag">NEW</div>' : ''}
                <button class="wishlist-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${m.title}')">
                    ${isFav ? '❤️' : '🤍'}
                </button>
                <div class="img-container">
                    <img src="${m.poster}" onerror="this.src='https://placehold.co'">
                    <div class="movie-overlay"><p>${m.desc}</p></div>
                </div>
                <div class="info">
                    <span class="genre-tag">${m.genre} • ${m.year} • ${m.country}</span>
                    <h3>${m.title}</h3>
                    <div class="rating">${'★'.repeat(m.rating)}${'☆'.repeat(5-m.rating)}</div>
                    <span class="actors-text">👥 ${m.actors}</span>
                    <a href="${m.link}" class="play-btn">ΠΡΟΒΟΛΗ</a>
                </div>
            </div>
        `}).join('');
    }

    function handleSearchInput(e) {
        const val = e.target.value.toLowerCase();
        filteredMovies = movies.filter(m => m.title.toLowerCase().includes(val) || m.actors.toLowerCase().includes(val));
        displayMovies(filteredMovies);
    }

    function handleCategory(cat) {
        document.querySelectorAll('#genreFilters .cat-btn').forEach(b => b.classList.toggle('active', b.innerText === (cat === 'All' ? 'Όλα' : cat)));
        triggerLoading(() => {
            filteredMovies = cat === "All" ? movies : movies.filter(m => m.genre === cat);
            displayMovies(filteredMovies);
        });
    }

    function handleYearChange(range) {
        if (range === "All") { filteredMovies = [...movies]; }
        else { const [s, e] = range.split('-').map(Number); filteredMovies = movies.filter(m => m.year >= s && m.year <= e); }
        displayMovies(filteredMovies);
    }

    function handleCountryChange(country) {
        triggerLoading(() => {
            filteredMovies = country === "All" ? movies : movies.filter(m => m.country === country);
            displayMovies(filteredMovies);
        });
    }

    function toggleFavorite(title) {
        let favs = JSON.parse(localStorage.getItem('favorites')) || [];
        favs = favs.includes(title) ? favs.filter(t => t !== title) : [...favs, title];
        localStorage.setItem('favorites', JSON.stringify(favs));
        displayMovies(filteredMovies);
    }

    function showFavorites() {
        const favs = JSON.parse(localStorage.getItem('favorites')) || [];
        triggerLoading(() => displayMovies(movies.filter(m => favs.includes(m.title))));
    }

    function triggerLoading(callback) {
        const bar = document.getElementById('loadingBar');
        bar.style.width = '100%';
        setTimeout(() => { callback(); setTimeout(() => bar.style.width = '0%', 300); }, 150);
    }

    displayMovies(movies);
</script>
</body>
</html>
